<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #090910;
  --bg2:      #0f0e18;
  --ink:      #e8e2d4;
  --muted:    #6b6880;
  --gold:     #c9a84c;
  --gold-dim: rgba(201,168,76,0.18);
  --card-bg:  rgba(18,16,30,0.92);
  --card-border: rgba(201,168,76,0.22);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  cursor: none;
  font-family: 'DM Mono', monospace;
}

/* grain overlay */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  opacity: 0.032;
}

/* cursor */
#cur-dot {
  position: fixed; z-index: 1000;
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 6px var(--gold);
  left: -20px; top: -20px;
}
#cur-ring {
  position: fixed; z-index: 999;
  width: 34px; height: 34px;
  border: 1px solid rgba(201,168,76,0.45);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: width .25s, height .25s, opacity .2s;
  left: -20px; top: -20px;
}

/* progress */
#progress-bar {
  position: fixed; top: 0; left: 0;
  height: 1px; width: 0%;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  z-index: 800;
  transition: width .08s linear;
}

/* HUD */
#hud {
  position: fixed; z-index: 500;
  top: 36px; left: 44px;
  color: var(--muted);
  font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase;
  line-height: 2.2;
}
#hud-idx { color: var(--gold); font-size: 11px; }
#hud-name { color: var(--ink); opacity: .6; }

#coords {
  position: fixed; z-index: 500;
  top: 36px; right: 44px;
  color: var(--muted);
  font-size: 9px; letter-spacing: .18em;
  text-align: right;
  line-height: 2;
}

/* hint */
#hint {
  position: fixed; z-index: 500;
  bottom: 38px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 14px;
  transition: opacity .8s ease;
  white-space: nowrap;
}
#hint::before, #hint::after {
  content: ''; display: block;
  width: 28px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--muted));
}
#hint::after { background: linear-gradient(90deg, var(--muted), transparent); }

/* canvas */
#bg-canvas {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}

/* cards container */
#stage {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}

/* individual cards */
.planet-card {
  position: absolute;
  pointer-events: all;
  transform-origin: center center;
  transition: none;
  width: 540px;
  left: 0; top: 0;
}

.card-inner {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 52px 56px 48px;
  position: relative;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.06),
    0 8px 80px rgba(0,0,0,0.7),
    0 2px 12px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(201,168,76,0.08);
}

/* gold top line animation */
.card-inner::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform .7s cubic-bezier(.22,1,.36,1);
}
.card-inner.front::before { transform: scaleX(1); }

/* corner ornament */
.card-inner::after {
  content: '\u25C8';
  position: absolute; bottom: 18px; right: 22px;
  font-size: 11px; color: var(--gold); opacity: .25;
}

.card-label {
  font-size: 9px; letter-spacing: .28em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.card-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
  max-width: 80px;
}

.card-sub {
  font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 18px; display: block;
}

.card-inner h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 64px;
  line-height: .9;
  color: var(--ink);
  letter-spacing: -.02em;
  margin-bottom: 28px;
}
.card-inner h2 em {
  font-style: italic; font-weight: 300;
  color: var(--gold);
}
.hero-inner h2 {
  font-size: 82px;
  line-height: .86;
  margin-bottom: 10px;
}

.card-divider {
  width: 36px; height: 1px;
  background: var(--gold);
  opacity: .45;
  margin: 22px 0;
}

.card-inner p {
  font-size: 12px; line-height: 1.9;
  color: var(--muted); font-weight: 300;
  max-width: 400px;
}

.card-tags {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-top: 26px;
}
.tag {
  font-size: 8px; letter-spacing: .16em;
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.2);
  padding: 5px 11px;
  color: var(--muted);
  background: rgba(201,168,76,0.04);
}

.card-links {
  display: flex; gap: 24px; flex-wrap: wrap;
  margin-top: 28px;
}
.card-link {
  font-size: 9px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--gold);
  text-decoration: none;
  opacity: .75;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: opacity .2s, border-color .2s;
}
.card-link:hover { opacity: 1; border-color: var(--gold); }

/* stat row for experience card */
.stat-row {
  display: flex; gap: 32px; margin-top: 22px; flex-wrap: wrap;
}
.stat-item {
  display: flex; flex-direction: column; gap: 4px;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 600;
  color: var(--gold); line-height: 1;
}
.stat-label {
  font-size: 7px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
}

/* responsive */
@media (max-width: 1200px) {
  .card-inner h2 { font-size: 52px; }
  .hero-inner h2 { font-size: 64px; }
}
@media (max-width: 768px) {
  html, body { cursor: auto; }
  #cur-dot, #cur-ring { display: none; }
  .planet-card { width: 92vw !important; max-width: 440px; }
  .card-inner { padding: 36px 32px 32px; }
  .card-inner h2 { font-size: 42px; }
  .hero-inner h2 { font-size: 52px; }
  #hud { top: 20px; left: 20px; }
  #coords { top: 20px; right: 20px; }
  #hint { bottom: 24px; font-size: 8px; }
  .stat-row { gap: 20px; }
  .stat-value { font-size: 22px; }
}
@media (max-width: 480px) {
  .card-inner h2 { font-size: 34px; }
  .hero-inner h2 { font-size: 40px; }
  .card-inner { padding: 28px 22px 24px; }
  .card-inner p { font-size: 11px; }
}
</style>
</head>

var sections = [

var N = sections.length;

/* ===== 3D ORRERY MATH ===== */
var ORBIT_RX    = 720;
var ORBIT_RY    = 210;
var TILT        = 1.08;
var DIAG        = 0.72;
var PERSP       = 1100;
var FRONT_ANGLE = Math.PI / 2;
var SCALE_FRONT = 1.0;
var SCALE_BACK  = 0.52;

function orbitPoint3D(angle) {
  var x0 = ORBIT_RX * Math.cos(angle);
  var y0 = ORBIT_RY * Math.sin(angle);
  var z0 = 0;
  var x1 =  x0;
  var y1 =  y0 * Math.cos(TILT) - z0 * Math.sin(TILT);
  var z1 =  y0 * Math.sin(TILT) + z0 * Math.cos(TILT);
  var x  =  x1 * Math.cos(DIAG) - y1 * Math.sin(DIAG);
  var y  =  x1 * Math.sin(DIAG) + y1 * Math.cos(DIAG);
  var z  =  z1;
  return { x: x, y: y, z: z };
}

function project(p3, cx, cy) {
  var scale = PERSP / (PERSP + p3.z + 300);
  return { sx: cx + p3.x * scale, sy: cy + p3.y * scale, scale: scale, z: p3.z };
}

function drawSpotlight(cx, cy, t) {
  var sx = cx, sy = cy - 210;
  var pulse = 0.5 + 0.5 * Math.sin(t * 1.8);
  var r1 = 260 + pulse * 30;
  var r2 = 520 + pulse * 40;
  var g1 = ctx.createRadialGradient(sx, sy, 0, sx, sy, r1);
  g1.addColorStop(0,   "rgba(201,168,76," + (0.055 + pulse * 0.025) + ")");
  g1.addColorStop(0.5, "rgba(201,168,76,0.018)");
  g1.addColorStop(1,   "rgba(201,168,76,0)");
  ctx.beginPath(); ctx.arc(sx, sy, r1, 0, Math.PI * 2);
  ctx.fillStyle = g1; ctx.fill();
  var g2 = ctx.createRadialGradient(sx, sy, r1 * 0.6, sx, sy, r2);
  g2.addColorStop(0,   "rgba(120,90,200,0.04)");
  g2.addColorStop(1,   "rgba(120,90,200,0)");
  ctx.beginPath(); ctx.arc(sx, sy, r2, 0, Math.PI * 2);
  ctx.fillStyle = g2; ctx.fill();
}

function cardTransform(i, prog, cx, cy) {
  var phase     = (i / N) * Math.PI * 2;
  var spinAngle = prog * Math.PI * 2;
  var angle     = FRONT_ANGLE - phase + spinAngle;
  var p3   = orbitPoint3D(angle);
  var proj = project(p3, cx, cy);
  var depthT = (p3.z + ORBIT_RY * 1.2) / (ORBIT_RY * 2.4);
  var opacity = 0.15 + depthT * 0.85;
  return {
    x: proj.sx, y: proj.sy,
    scale: proj.scale * (SCALE_BACK + (SCALE_FRONT - SCALE_BACK) * depthT),
    opacity: opacity, z: p3.z, depthT: depthT, angle: angle
  };
}

/* ===== BUILD CARD DOM ===== */
var stage = document.getElementById("stage");
var CARD_W = 540;

function buildCard(sec) {
  var wrap = document.createElement("div");
  wrap.className = "planet-card";
  wrap.style.width = CARD_W + "px";
  var html = "";
  if (sec.type === "hero") {
    html = '<div class="card-inner hero-inner">' +
      '<div class="card-label">' + sec.label + '</div>' +
      '<span class="card-sub">' + sec.sub + '</span>' +
      '<h2>' + sec.name.replace(/\n/g,"<br>") + '</h2>' +
      '<div class="card-divider"></div>' +
      '<p>' + sec.body + '</p>' +
      '<div class="card-links">' + sec.links.map(function(l){return '<a class="card-link" href="'+l.href+'" target="_blank" rel="noopener">'+l.text+'</a>';}).join("") + '</div>' +
      '</div>';
  } else if (sec.type === "contact") {
    html = '<div class="card-inner">' +
      '<div class="card-label">' + sec.label + '</div>' +
      '<h2>' + sec.title.replace(/\n/g,"<br>") + '</h2>' +
      '<p>' + sec.body + '</p>' +
      '<div class="card-links"><a class="card-link" href="mailto:' + sec.email + '">' + sec.email + '</a></div>' +
      '<div class="card-tags">' + sec.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join("") + '</div>' +
      '</div>';
  } else if (sec.type === "experience") {
    html = '<div class="card-inner">' +
      '<div class="card-label">' + sec.label + '</div>' +
      '<h2>' + sec.title.replace(/\n/g,"<br>") + '</h2>' +
      '<p>' + sec.body + '</p>' +
      '<div class="stat-row">' + sec.stats.map(function(s){return '<div class="stat-item"><span class="stat-value">'+s.value+'</span><span class="stat-label">'+s.label+'</span></div>';}).join("") + '</div>' +
      '<div class="card-tags">' + sec.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join("") + '</div>' +
      '</div>';
  } else {
    html = '<div class="card-inner">' +
      '<div class="card-label">' + sec.label + '</div>' +
      '<h2>' + sec.title.replace(/\n/g,"<br>") + '</h2>' +
      '<p>' + sec.body + '</p>' +
      '<div class="card-tags">' + sec.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join("") + '</div>' +
      (sec.link ? '<div class="card-links"><a class="card-link" href="https://github.com/dazhuox" target="_blank" rel="noopener">' + sec.link + '</a></div>' : '') +
      '</div>';
  }
  wrap.innerHTML = html;
  stage.appendChild(wrap);
  return wrap;
}

var cardEls = [];
for (var ci = 0; ci < sections.length; ci++) {
  cardEls.push(buildCard(sections[ci]));
}

/* ===== CANVAS ===== */
var canvas = document.getElementById("bg-canvas");
var ctx    = canvas.getContext("2d");
var W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateStars();
}

var stars = [];
function generateStars() {
  stars = [];
  var count = Math.floor((W * H) / 4200);
  for (var i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() < 0.92 ? Math.random() * 0.7 + 0.2 : Math.random() * 1.4 + 0.7,
      a: Math.random() * 0.5 + 0.15,
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed:  Math.random() * 0.4 + 0.1
    });
  }
}

resize();
window.addEventListener("resize", resize);

function drawStars(t) {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var tw = s.a * (0.7 + 0.3 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(230,220,200," + tw + ")";
    ctx.fill();
  }
}

function drawNebula() {
  var blobs = [
    { x: W * 0.72, y: H * 0.22, r: W * 0.38, c1: "rgba(80,60,120,0.07)", c2: "rgba(80,60,120,0)" },
    { x: W * 0.22, y: H * 0.75, r: W * 0.32, c1: "rgba(30,60,100,0.05)", c2: "rgba(30,60,100,0)" }
  ];
  for (var i = 0; i < blobs.length; i++) {
    var b = blobs[i];
    var g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, b.c1);
    g.addColorStop(1, b.c2);
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.r, b.r * 0.55, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

function drawRing(prog, cx, cy) {
  var segments = 120;
  var pass, s, angle, p3, isFront, proj, started;

  for (pass = 0; pass < 2; pass++) {
    ctx.save();
    ctx.beginPath();
    started = false;
    for (s = 0; s <= segments; s++) {
      angle = (s / segments) * Math.PI * 2;
      p3 = orbitPoint3D(angle);
      isFront = p3.z >= 0;
      if ((pass === 0 && isFront) || (pass === 1 && !isFront)) { started = false; continue; }
      proj = project(p3, cx, cy);
      if (!started) { ctx.moveTo(proj.sx, proj.sy); started = true; }
      else ctx.lineTo(proj.sx, proj.sy);
    }
    ctx.strokeStyle = "rgba(201,168,76," + (pass === 0 ? 0.12 : 0.32) + ")";
    ctx.lineWidth = pass === 0 ? 0.8 : 1.8;
    ctx.stroke();
    ctx.restore();
  }

  /* dashed equator */
  ctx.save();
  ctx.setLineDash([2, 18]);
  ctx.strokeStyle = "rgba(201,168,76,0.09)";
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  var first = true;
  for (s = 0; s <= segments; s++) {
    angle = (s / segments) * Math.PI * 2;
    p3 = orbitPoint3D(angle);
    proj = project(p3, cx, cy);
    if (first) { ctx.moveTo(proj.sx, proj.sy); first = false; }
    else ctx.lineTo(proj.sx, proj.sy);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  /* node dots */
  for (var i = 0; i < N; i++) {
    var phase     = (i / N) * Math.PI * 2;
    var spinAngle = prog * Math.PI * 2;
    angle = FRONT_ANGLE - phase + spinAngle;
    p3 = orbitPoint3D(angle);
    proj = project(p3, cx, cy);
    var depthT = (p3.z + ORBIT_RY * 1.2) / (ORBIT_RY * 2.4);
    var isAct  = i === activeIndex(prog);
    var dotR = isAct ? 0 : (2.5 + depthT * 1.5);
    var dotA = 0.15 + depthT * 0.35;
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, dotR, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(201,168,76," + dotA + ")";
    ctx.fill();
  }

  /* orbital shadow */
  ctx.save();
  ctx.translate(cx, cy + ORBIT_RY * 0.35);
  ctx.scale(1, 0.18);
  var shadowG = ctx.createRadialGradient(0, 0, 0, 0, 0, ORBIT_RX * 1.1);
  shadowG.addColorStop(0,   "rgba(0,0,0,0.22)");
  shadowG.addColorStop(0.6, "rgba(0,0,0,0.08)");
  shadowG.addColorStop(1,   "rgba(0,0,0,0)");
  ctx.beginPath();
  ctx.arc(0, 0, ORBIT_RX * 1.1, 0, Math.PI * 2);
  ctx.fillStyle = shadowG;
  ctx.fill();
  ctx.restore();
}

/* ===== SCROLL STATE ===== */
var progress   = 0;
var target     = 0;
var hintGone   = false;
var idleTime   = 0;
var lastTarget = 0;
var bgTime     = 0;

/* snap-to-card */
var snapTimer = null;
var SNAP_DELAY = 600;

function scheduleSnap() {
  clearTimeout(snapTimer);
  snapTimer = setTimeout(function() {
    var step = 1 / N;
    var nearest = Math.round(target / step) * step;
    target = nearest;
  }, SNAP_DELAY);
}

function hideHint() {
  if (!hintGone) {
    document.getElementById("hint").style.opacity = "0";
    hintGone = true;
  }
}

function activeIndex(p) {
  var raw = ((p % 1) + 1) % 1;
  return Math.round(raw * N) % N;
}

/* ===== RENDER ===== */
var lastTime = performance.now();

function render(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  bgTime += dt;

  if (Math.abs(target - lastTarget) < 0.0001) {
    idleTime += dt;
  } else {
    idleTime = 0;
  }
  lastTarget = target;
  if (idleTime > 5.0) {
    target += 0.00015;
  }

  progress += (target - progress) * 0.14;

  var cx = W / 2;
  var cy = H / 2;

  ctx.clearRect(0, 0, W, H);
  drawNebula();
  drawSpotlight(cx, cy, bgTime);
  drawStars(bgTime);
  drawRing(progress, cx, cy);

  /* HUD coords */
  var deg = ((progress % 1) * 360 + 360) % 360;
  var hh  = Math.floor(deg / 15);
  var mm  = Math.floor((deg % 15) * 4);
  document.getElementById("coord-angle").textContent =
    "RA " + String(hh).padStart(2,"0") + "h " + String(mm).padStart(2,"0") + "m";

  /* progress bar */
  var barPct = ((progress % 1) + 1) % 1;
  document.getElementById("progress-bar").style.width = (barPct * 100) + "%";

  /* active index */
  var ai = activeIndex(progress);
  document.getElementById("hud-idx").textContent  = String(ai + 1).padStart(2,"0");
  document.getElementById("hud-name").textContent = sections[ai].label.replace("\u2726 ","");

  /* position cards */
  var transforms = [];
  for (var i = 0; i < cardEls.length; i++) {
    transforms.push({ el: cardEls[i], i: i, t: cardTransform(i, progress, cx, cy) });
  }
  transforms.sort(function(a, b) { return a.t.z - b.t.z; });

  for (var si = 0; si < transforms.length; si++) {
    var item = transforms[si];
    var el = item.el;
    var idx = item.i;
    var t = item.t;
    var isActive = idx === ai;
    var inner = el.querySelector(".card-inner");
    var finalX, finalY, finalScale, finalOpacity;

    if (isActive) {
      /* active card: centered, upper portion of screen */
      finalX       = cx - CARD_W / 2;
      finalY       = Math.max(40, cy * 0.28);
      finalScale   = Math.min(1.22, W / 700);
      finalOpacity = 1.0;
    } else {
      /* background cards on orbital path */
      finalX       = t.x - CARD_W / 2;
      finalY       = t.y - 80;
      finalScale   = t.scale * 0.58;
      finalOpacity = Math.min(t.opacity * 0.38, 0.22);
    }

    el.style.transform  = "translate(" + finalX + "px, " + finalY + "px) scale(" + finalScale + ")";
    el.style.opacity    = String(finalOpacity);
    el.style.zIndex     = isActive ? "200" : String(si + 10);
    el.style.transition = isActive
      ? "opacity .5s ease, transform .55s cubic-bezier(.22,1,.36,1)"
      : "opacity .4s ease, transform .5s cubic-bezier(.22,1,.36,1)";

    if (isActive) { inner.classList.add("front"); }
    else { inner.classList.remove("front"); }
    el.style.pointerEvents = isActive ? "all" : "none";
  }

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

/* ===== INPUT ===== */
var SCROLL_SPEED = 1 / (N * 160);

window.addEventListener("wheel", function(e) {
  e.preventDefault(); hideHint();
  target += (e.deltaY + e.deltaX) * SCROLL_SPEED;
  scheduleSnap();
}, { passive: false });

var tx0 = 0, ty0 = 0;
window.addEventListener("touchstart", function(e) {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });
window.addEventListener("touchmove", function(e) {
  e.preventDefault(); hideHint();
  var dx = tx0 - e.touches[0].clientX;
  var dy = ty0 - e.touches[0].clientY;
  target += (dy + dx) * SCROLL_SPEED * 0.6;
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
  scheduleSnap();
}, { passive: false });
window.addEventListener("touchend", function() { scheduleSnap(); });

window.addEventListener("keydown", function(e) {
  hideHint();
  var step = 1 / N;
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { target += step; scheduleSnap(); }
  if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { target -= step; scheduleSnap(); }
});

/* ===== CURSOR ===== */
var dot  = document.getElementById("cur-dot");
var ring = document.getElementById("cur-ring");
var mx = W / 2, my = H / 2, crx = W / 2, cry = H / 2;

document.addEventListener("mousemove", function(e) {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + "px";
  dot.style.top  = my + "px";
});

(function follow() {
  crx += (mx - crx) * 0.12;
  cry += (my - cry) * 0.12;
  ring.style.left = crx + "px";
  ring.style.top  = cry + "px";
  requestAnimationFrame(follow);
})();

document.addEventListener("mousedown", function() {
  ring.style.width = ring.style.height = "16px";
  ring.style.opacity = "0.8";
});
document.addEventListener("mouseup", function() {
  ring.style.width = ring.style.height = "34px";
  ring.style.opacity = "0.45";
});
</script>
</body>
